seed: 42
reference_date: "2025-01-01"
total_subscribers: 600

# -- Level Weights --
# Controls how much each hierarchy level contributes to final blended
# demographics. Must sum to 1.0.
level_weights:
  group: 0.40
  subgroup: 0.20
  plan: 0.20
  product: 0.20

# -- Plan Enrollment Weights (keyed by CSPD_CAT) --
plan_enrollment_weights:
  M: 1.0
  D: 0.60
  C: 0.30

# -- Shared cluster definitions --
# Subgroup, plan, and product levels use the SAME cluster centroids
# across all groups so that cluster indices are globally comparable.

# Subgroup-level clusters (shared across all subgroups)
_subgroup_clusters: &sg_clusters
  - name: sg_experienced
    weight: 0.50
    continuous:
      age: {mean: 50, std: 2.0}
      tenure_months: {mean: 170, std: 3.0}
    categorical:
      meme_sex: {M: 0.55, F: 0.45}
      meme_marital_status: {M: 0.65, S: 0.20, D: 0.15}
  - name: sg_newcomer
    weight: 0.50
    continuous:
      age: {mean: 26, std: 2.0}
      tenure_months: {mean: 12, std: 2.5}
    categorical:
      meme_sex: {M: 0.48, F: 0.52}
      meme_marital_status: {S: 0.80, M: 0.20}

# Medical (M) plan-level clusters (shared)
_med_plan_clusters: &M_plan_clusters
  - name: med_high_util
    weight: 0.45
    continuous:
      age: {mean: 48, std: 1.8}
      tenure_months: {mean: 100, std: 2.5}
    categorical:
      meme_sex: {M: 0.50, F: 0.50}
