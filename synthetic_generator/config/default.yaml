# -- Groups (using real GRGR_CK values from Facets lookups) --
# Identity fields (GRGR_NAME, GRGR_ID, state, county, etc.) are pulled
# from plans.parquet at runtime. Config only specifies grgr_ck, subgroups,
# plans (by cspi_id), cluster definitions, and target_subscribers.
groups:
  # -- Group 1: CareSource Ohio (GRGR_CK=1, Medicaid, OH) --
  - grgr_ck: 1
    target_subscribers: 120
    member_clusters:
      - name: blue_collar_veteran
        weight: 0.55
        continuous:
          age: {mean: 52, std: 2.0}
          tenure_months: {mean: 140, std: 2.5}
        categorical:
          meme_sex: {M: 0.72, F: 0.28}
          meme_marital_status: {M: 0.65, S: 0.18, D: 0.17}
        family:
          spouse_prob: 0.55
          children: {mean: 1.0, std: 0.7}
      - name: young_laborer
        weight: 0.45
        continuous:
          age: {mean: 28, std: 2.0}
          tenure_months: {mean: 15, std: 2.5}
        categorical:
          meme_sex: {M: 0.68, F: 0.32}
          meme_marital_status: {S: 0.75, M: 0.25}
        family:
          spouse_prob: 0.15
          children: {mean: 0.1, std: 0.3}
    subgroups:
      - sgsg_ck: 179  # CareSource Pending Members of Ohio
        member_clusters: *sg_clusters
        plans:
          - cspi_id: CSM1    # CareSource Ohio Medical
            member_clusters: *M_plan_clusters
            products:
              - lobd_id: CS01
                member_clusters: *CS01_product_clusters
          - cspi_id: CSD1    # CareSource Ohio Dental
            member_clusters: *D_plan_clusters
            products:
              - lobd_id: CSD1
                member_clusters: *CSD1_product_clusters
      - sgsg_ck: 312  # ABD West Region A1
        member_clusters: *sg_clusters
        plans:
          - cspi_id: ABDM    # CareSource Ohio, ABD Medical
            member_clusters: *M_plan_clusters
            products:
              - lobd_id: CS01
                member_clusters: *CS01_product_clusters
          - cspi_id: ABDD    # CareSource Ohio, ABD Dental
            member_clusters: *D_plan_clusters
            products:
              - lobd_id: CSD1
                member_clusters: *CSD1_product_clusters

  # -- Group 2: CareSource Kentucky (GRGR_CK=5, Medicaid, KY) --
  - grgr_ck: 5
    target_subscribers: 100
    member_clusters:
      - name: clinical_staff
        weight: 0.50
        continuous:
          age: {mean: 36, std: 2.0}
          tenure_months: {mean: 60, std: 2.5}
        categorical:
          meme_sex: {M: 0.32, F: 0.68}
          meme_marital_status: {M: 0.55, S: 0.35, D: 0.10}
        family:
          spouse_prob: 0.50
          children: {mean: 1.3, std: 0.8}
      - name: admin_senior
        weight: 0.50
        continuous:
          age: {mean: 58, std: 2.0}
          tenure_months: {mean: 180, std: 2.5}
        categorical:
          meme_sex: {M: 0.45, F: 0.55}
          meme_marital_status: {M: 0.62, S: 0.12, D: 0.15, W: 0.11}
        family:
          spouse_prob: 0.55
          children: {mean: 0.4, std: 0.5}
    subgroups:
      - sgsg_ck: 307  # Kentucky Region 3 Families and Children
        member_clusters: *sg_clusters
        plans:
          - cspi_id: KYM1        # CS Kentucky Medical
            member_clusters: *M_plan_clusters
            products:
              - lobd_id: KY01
                member_clusters: *KY01_product_clusters
          - cspi_id: KYD1        # CareSource Kentucky Dental
            member_clusters: *D_plan_clusters
            products:
              - lobd_id: KYD1
                member_clusters: *KYD1_product_clusters
      - sgsg_ck: 308  # Kentucky Region 3 Adult Disability
        member_clusters: *sg_clusters
        plans:
          - cspi_id: KYMSTATE    # KY State w copay Medical
            member_clusters: *M_plan_clusters
            products:
              - lobd_id: KY01
                member_clusters: *KY01_product_clusters
          - cspi_id: KYD2        # CS Kentucky Dental
            member_clusters: *D_plan_clusters
            products:
              - lobd_id: KYD1
                member_clusters: *KYD1_product_clusters

  # -- Group 3: Ohio MyCare Dual (GRGR_CK=7, Dual, OH) --
  - grgr_ck: 7
    target_subscribers: 80
    member_clusters:
      - name: dual_senior
        weight: 0.55
