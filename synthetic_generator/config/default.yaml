seed: 42
reference_date: "2025-01-01"
total_subscribers: 600

# ── Group-Level Clusters ────────────────────────────────────────────
# Each group cluster represents an employer archetype.
# subscriber_count uses Gaussian sampling (mean/std).
# member_cluster_weights control the mix of member demographics per group type.
group_clusters:
  - name: large_manufacturing
    weight: 0.35
    count: 5
    attributes:
      subscriber_count: {mean: 70, std: 12}
      grgr_state: OH
      grgr_county: Franklin
      grgr_mctr_type: COMM
      grgr_orig_year: {mean: 2016, std: 2}
    name_templates:
      - "{prefix} Manufacturing LLC"
      - "{prefix} Industrial Corp"
      - "{prefix} Fabrication Inc"
      - "{prefix} Steel Works"
      - "{prefix} Assembly Group"
    subgroup:
      plans: [medical, dental]
    member_cluster_weights:
      young_professional: 0.20
      established_family: 0.30
      mid_career: 0.30
      pre_retirement: 0.15
      recent_graduate: 0.05

  - name: healthcare_system
    weight: 0.35
    count: 5
    attributes:
      subscriber_count: {mean: 80, std: 15}
      grgr_state: OH
      grgr_county: Cuyahoga
      grgr_mctr_type: COMM
      grgr_orig_year: {mean: 2014, std: 3}
    name_templates:
      - "{prefix} Healthcare Systems"
      - "{prefix} Medical Group"
      - "{prefix} Health Partners"
      - "{prefix} Regional Hospital"
      - "{prefix} Care Network"
    subgroup:
      plans: [medical, dental, vision]
    member_cluster_weights:
      young_professional: 0.15
      established_family: 0.25
      mid_career: 0.30
      pre_retirement: 0.20
      recent_graduate: 0.10

  - name: small_tech
    weight: 0.30
    count: 6
    attributes:
      subscriber_count: {mean: 35, std: 8}
      grgr_state: IN
      grgr_county: Marion
      grgr_mctr_type: COMM
      grgr_orig_year: {mean: 2020, std: 1.5}
    name_templates:
      - "{prefix} Technologies Inc"
      - "{prefix} Software Solutions"
      - "{prefix} Digital Services"
      - "{prefix} Data Systems"
      - "{prefix} Cloud Corp"
      - "{prefix} Analytics LLC"
    subgroup:
      plans: [medical, dental]
    member_cluster_weights:
      young_professional: 0.35
      established_family: 0.15
      mid_career: 0.25
      pre_retirement: 0.05
      recent_graduate: 0.20

# ── Member-Level Clusters ───────────────────────────────────────────
# Centroids for continuous attributes (age, tenure_months) with Gaussian noise.
# Categorical attributes use weighted probability distributions.
# Clusters should be well-separated: centroid distance > 2*max(std) on at least
# one continuous dimension for reliable unsupervised recovery.
member_clusters:
  - name: young_professional
    continuous:
      age: {mean: 28, std: 2.0}
      tenure_months: {mean: 20, std: 4}
    categorical:
      meme_sex: {M: 0.55, F: 0.45}
      meme_marital_status: {S: 0.80, M: 0.20}
    family:
      spouse_prob: 0.15
      children: {mean: 0.1, std: 0.3}
    plan_preference: medical_only

  - name: established_family
    continuous:
      age: {mean: 36, std: 2.5}
      tenure_months: {mean: 48, std: 8}
    categorical:
      meme_sex: {M: 0.50, F: 0.50}
      meme_marital_status: {M: 0.88, S: 0.12}
    family:
      spouse_prob: 0.85
      children: {mean: 2.0, std: 0.8}
    plan_preference: full_suite

  - name: mid_career
    continuous:
      age: {mean: 47, std: 2.5}
      tenure_months: {mean: 96, std: 10}
    categorical:
      meme_sex: {M: 0.52, F: 0.48}
      meme_marital_status: {M: 0.70, S: 0.15, D: 0.15}
    family:
      spouse_prob: 0.60
      children: {mean: 1.0, std: 0.8}
    plan_preference: medical_dental

  - name: pre_retirement
    continuous:
      age: {mean: 59, std: 2.0}
      tenure_months: {mean: 168, std: 18}
    categorical:
      meme_sex: {M: 0.50, F: 0.50}
      meme_marital_status: {M: 0.60, S: 0.15, W: 0.10, D: 0.15}
    family:
      spouse_prob: 0.50
      children: {mean: 0.2, std: 0.4}
    plan_preference: medical_dental

  - name: recent_graduate
    continuous:
      age: {mean: 22, std: 1.0}
      tenure_months: {mean: 3, std: 1.5}
    categorical:
      meme_sex: {M: 0.48, F: 0.52}
      meme_marital_status: {S: 0.95, M: 0.05}
    family:
      spouse_prob: 0.03
      children: {mean: 0, std: 0}
    plan_preference: medical_only

# ── Plan Profiles ───────────────────────────────────────────────────
# Which plan types each profile includes.
plan_profiles:
  medical_only: [medical]
  medical_dental: [medical, dental]
  full_suite: [medical, dental, vision]

# ── Enrollment Patterns ─────────────────────────────────────────────
enrollment:
  term_rate: 0.10
  reinstate_rate: 0.40
  term_reasons: [VTRM, NPAY, MOVE]

# ── Name Prefixes for Group Generation ──────────────────────────────
group_name_prefixes:
  - Buckeye
  - Great Lakes
  - Midwest
  - Heritage
  - Summit
  - Cascade
  - Pinnacle
  - Horizon
  - Keystone
  - Frontier
  - Liberty
  - Pioneer
  - Crestview
  - Sterling
  - Apex
  - Crossroads
